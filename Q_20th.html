<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>视频播放</title>
<style>
  /* 设置背景颜色和确保页面填满整个视口 */
  body, html {
    height: 100%;
    margin: 0;
    background-color: black;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* 设置视频播放器的最大宽度和自适应高度 */
  video {
    width: 95%; /* 留出一点边距 */
    max-width: 1024px; /* 最大宽度，可以根据需要调整 */
  }
</style>
</head>
<body>
  <video controls autoplay preload="metadata" poster="your-poster.jpg">
    <source src="https://gitee.com/gaivr/G_Video/raw/master/test.mp4" type="video/mp4">
    <source src="your-video.webm" type="video/webm"> <!-- 备用视频源 -->
    你的浏览器不支持 video 标签。
  </video>
</body>
</html>
